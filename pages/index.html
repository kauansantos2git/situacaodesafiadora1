<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <title>Document</title>
</head>
<body>
    <h1>TAREFAS DO PROJETO</h1>
    
    <form class="linha">
        <label for="">Valor da hora</label>
        <input type="number" id="valor-hora" placeholder="R$00,00">
    </form>

    <form class="linha">
        <section class="fundocinza">
            <input type="text" id="nome-tarefa" placeholder="Insira a tarefa...">
            <label for="">Horas</label>
            <input type="number" id="horas" placeholder="00h">
        </section>
        <button class="adicionar">
            <span class="material-symbols-outlined">add</span>
        </button>
    </form>

    <form class="linhacinza">
        <section class="">
            <p>Tarefa 1</p>
            <p>00h</p>
            <button class="excluir">
                <span class="material-symbols-outlined">delete</span>
            </button>
        </section>
    </form>

</body>
</html>
